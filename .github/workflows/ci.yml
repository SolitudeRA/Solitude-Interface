name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ==============================================
# CI Environment Variables
# Uses Ghost Demo API for build validation only
# ==============================================
env:
  GHOST_URL: https://demo.ghost.io
  GHOST_CONTENT_KEY: '22444f78447824223cefc48062'
  GHOST_VERSION: v5.0
  GHOST_TIMEOUT: '5000'
  SITE_URL: https://example.com
  IMAGE_HOST_URL: ''
  GOOGLE_ANALYTICS_TAG_ID: ''

jobs:
  # ============================================
  # Single job: install once, then lint / test /
  # typecheck / build as sequential steps. Uses
  # setup-node's built-in pnpm-store cache.
  # ============================================
  ci:
    name: Lint · Test · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro sync (generate types)
        run: pnpm astro sync

      - name: Check (lint + format + typecheck)
        run: pnpm check

      - name: Test (vitest run)
        run: pnpm test:run

      - name: Build
        run: pnpm build
