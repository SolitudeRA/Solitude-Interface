<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Timeline v2 · 进度数字 + 响应式 + 动效</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --text: #f8fafc;
        --panel: rgba(17, 24, 39, 0.82);
        --panel-border: rgba(255, 255, 255, 0.12);
        --grad: linear-gradient(90deg, #ffd166, #6ee7ff, #8aa2ff, #6ee7ff, #ffd166);
        --glow-cyan: rgb(110 231 255 / 0.45);
        --glow-blue: rgb(138 162 255 / 0.28);
        /* 可调 */
        --trans: 380ms;
        --offset-trans: 420ms;
        --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
        --flow-dur: 3.2s;
        --breathe-dur: 2.4s;
        --num-scale: 0.8;
        --num-grad: linear-gradient(90deg, #ffd166, #6ee7ff, #8aa2ff);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        background:
          radial-gradient(1200px 600px at 72% -8%, rgba(110, 231, 255, 0.08), transparent 60%),
          radial-gradient(900px 500px at 8% 112%, rgba(138, 162, 255, 0.09), transparent 60%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* ===== 卡片画廊 ===== */
      .gallery {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        gap: 60px;
        padding: 0 clamp(16px, 12vw, 220px);
        overflow-x: auto;
        scrollbar-width: none;
        scroll-snap-type: x mandatory;
      }
      .gallery::-webkit-scrollbar {
        display: none;
      }
      .gallery.no-snap {
        scroll-snap-type: none;
      }
      .card {
        flex: 0 0 auto;
        width: clamp(200px, 18vw, 290px);
        height: min(68svh, 540px);
        scroll-snap-align: center;
        border-radius: 26px;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 26px 56px rgba(0, 0, 0, 0.46);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 20px;
      }
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent 40%, rgba(3, 7, 18, 0.72));
      }
      .card .idx {
        position: absolute;
        top: 14px;
        left: 16px;
        font-size: 0.68rem;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.78);
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        padding: 3px 9px;
        z-index: 2;
      }
      .card h3 {
        position: relative;
        z-index: 2;
        margin: 0;
        font-size: 1.3rem;
        font-weight: 800;
        text-shadow: 0 2px 12px rgba(3, 7, 18, 0.8);
      }

      /* ===== 左下角集群:进度数字 + 时间线 ===== */
      .cluster {
        position: fixed;
        bottom: 0;
        left: 0;
        z-index: 60;
        width: clamp(320px, 38vw, 560px);
        height: 11vh;
        min-height: 92px;
        display: flex;
        align-items: center;
        gap: clamp(12px, 1.6vw, 22px);
        padding: 0 clamp(16px, 3vw, 40px);
        pointer-events: none;
      }
      /* 进度数字 */
      .progress-num {
        flex: 0 0 auto;
        display: flex;
        align-items: baseline;
        gap: 0.32em;
        font-variant-numeric: tabular-nums;
        line-height: 1;
        pointer-events: auto;
        user-select: none;
      }
      .progress-num .cur {
        font-size: calc(clamp(1.5rem, 2.6vw, 2.1rem) * var(--num-scale));
        font-weight: 850;
        letter-spacing: 0.01em;
        background: var(--num-grad);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        transition: opacity var(--trans) ease;
      }
      .progress-num .sep {
        font-size: calc(clamp(1rem, 1.7vw, 1.35rem) * var(--num-scale));
        font-weight: 600;
        color: rgba(248, 250, 252, 0.32);
        transform: translateY(-0.02em);
      }
      .progress-num .total {
        font-size: calc(clamp(0.95rem, 1.5vw, 1.2rem) * var(--num-scale));
        font-weight: 700;
        color: rgba(248, 250, 252, 0.5);
      }
      .cluster.no-num .progress-num {
        display: none;
      }

      /* 时间线 */
      .timeline {
        position: relative;
        flex: 1 1 auto;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        overflow: visible;
        pointer-events: auto;
      }
      .aura {
        position: absolute;
        left: 0;
        top: 50%;
        width: 100%;
        height: 90px;
        transform: translateY(-50%);
        pointer-events: none;
        filter: blur(34px);
        opacity: 0.5;
        background: radial-gradient(
          ellipse at 30% 50%,
          rgb(110 231 255 / 0.16),
          rgb(138 162 255 / 0.1) 38%,
          rgb(255 209 102 / 0.045) 60%,
          transparent 78%
        );
        -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 70%, transparent 100%);
        mask-image: linear-gradient(90deg, #000 0%, #000 70%, transparent 100%);
      }
      .tl-inner {
        position: relative;
        display: flex;
        align-items: center;
        will-change: transform;
        transition: transform var(--offset-trans) var(--ease);
      }
      .marker {
        flex: 0 0 auto;
        height: 6px;
        border: 0;
        padding: 0;
        border-radius: 999px;
        cursor: pointer;
        background: color-mix(in oklch, var(--text) 55%, transparent);
        transition:
          width var(--trans) var(--ease),
          margin var(--trans) var(--ease),
          opacity var(--trans) ease,
          background var(--trans) ease;
      }
      .marker.active {
        background: var(--grad);
        background-size: 200% 100%;
        box-shadow:
          0 0 10px var(--glow-cyan),
          0 0 20px var(--glow-blue);
      }
      .fx-flow .marker.active {
        animation: flow var(--flow-dur) linear infinite;
      }
      .fx-breathe .marker.active {
        animation:
          flow var(--flow-dur) linear infinite,
          breathe var(--breathe-dur) ease-in-out infinite;
      }
      .fx-breathe.no-flow .marker.active {
        animation: breathe var(--breathe-dur) ease-in-out infinite;
      }
      /* active 切换时的轻微 pop(进出场) */
      .pop .marker.active {
        animation:
          flow var(--flow-dur) linear infinite,
          breathe var(--breathe-dur) ease-in-out infinite,
          pop 0.42s var(--ease);
      }
      @keyframes flow {
        from {
          background-position: 0% 50%;
        }
        to {
          background-position: 200% 50%;
        }
      }
      @keyframes breathe {
        0%,
        100% {
          box-shadow:
            0 0 8px var(--glow-cyan),
            0 0 16px var(--glow-blue);
        }
        50% {
          box-shadow:
            0 0 16px var(--glow-cyan),
            0 0 30px var(--glow-blue);
        }
      }
      @keyframes pop {
        0% {
          transform: scaleY(1);
        }
        40% {
          transform: scaleY(1.9);
        }
        100% {
          transform: scaleY(1);
        }
      }

      /* 窄屏:集群居中、数字略缩 */
      @media (max-width: 720px) {
        .cluster {
          width: 100%;
          justify-content: center;
          height: 12vh;
        }
        .timeline {
          flex: 0 1 auto;
        }
      }

      /* 控制面板 */
      .panel {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 80;
        width: 244px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 14px 16px;
        backdrop-filter: blur(14px);
        font-size: 0.8rem;
      }
      .panel h2 {
        margin: 0 0 10px;
        font-size: 0.8rem;
        font-weight: 800;
      }
      .panel .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 6px 0;
        color: rgba(248, 250, 252, 0.78);
      }
      .panel input[type="range"] {
        width: 116px;
        accent-color: #6ee7ff;
      }
      .panel .val {
        min-width: 38px;
        text-align: right;
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }
      .panel .toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 12px;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--panel-border);
      }
      .panel label.chk {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .tip {
        position: fixed;
        left: 50%;
        bottom: 6px;
        transform: translateX(-50%);
        z-index: 70;
        color: rgba(248, 250, 252, 0.4);
        font-size: 0.74rem;
        pointer-events: none;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="gallery" id="gallery"></div>

    <div class="cluster fx-flow fx-breathe" id="cluster">
      <div class="progress-num" id="pnum">
        <span class="cur" id="cur">01</span>
        <span class="sep">/</span>
        <span class="total" id="total">36</span>
      </div>
      <div class="timeline">
        <div class="aura"></div>
        <div class="tl-inner" id="tl"></div>
      </div>
    </div>

    <div class="tip">滚轮 / 拖动滚动卡片 · 缩放窗口看响应式 · 右上面板调动效</div>

    <div class="panel">
      <h2>时间线 v2 · 参数</h2>
      <div class="row">
        <span>过渡 ms</span><input type="range" id="trans" min="200" max="600" step="10" value="380" /><span class="val" id="vTrans">380</span>
      </div>
      <div class="row">
        <span>流光速度 s</span><input type="range" id="flow" min="1.5" max="6" step="0.1" value="3.2" /><span class="val" id="vFlow">3.2</span>
      </div>
      <div class="row">
        <span>呼吸速度 s</span><input type="range" id="breathe" min="1.2" max="5" step="0.1" value="2.4" /><span class="val" id="vBreathe">2.4</span>
      </div>
      <div class="row">
        <span>横杠半径 K</span><input type="range" id="kbars" min="1" max="6" step="1" value="3" /><span class="val" id="vK">3</span>
      </div>
      <div class="row">
        <span>外侧点 J</span><input type="range" id="jdots" min="0" max="6" step="1" value="4" /><span class="val" id="vJ">4</span>
      </div>
      <div class="row">
        <span>形变锐度</span><input type="range" id="sharp" min="1.5" max="5" step="0.1" value="3.7" /><span class="val" id="vSharp">3.7</span>
      </div>
      <div class="row">
        <span>数字大小</span><input type="range" id="numScale" min="0.5" max="1.2" step="0.05" value="0.8" /><span class="val" id="vNum">0.80</span>
      </div>
      <div class="toggles">
        <label class="chk"><input type="checkbox" id="cNum" checked /> 进度数字</label>
        <label class="chk"><input type="checkbox" id="cFlow" checked /> 流光</label>
        <label class="chk"><input type="checkbox" id="cBreathe" checked /> 呼吸</label>
        <label class="chk"><input type="checkbox" id="cPop" checked /> 切换 pop</label>
        <label class="chk"><input type="checkbox" id="cSnap" checked /> snap</label>
        <label class="chk"><input type="checkbox" id="cReduce" /> reduced-motion</label>
      </div>
    </div>

    <script>
      const N = 36;
      const BASE_BAR = 30,
        DOT_W = 6,
        GAP = 16;
      let K = 3,
        J = 4,
        sharp = 3.7;
      let popOn = true;
      const titles = ['智能家居平台','DevOps 平台','云存储','信息收集系统','OS 安装','硬件选型','韩式汤饭','Reboot','关于生活'];
      const palette = [['#1e3a8a','#0ea5e9'],['#7c2d12','#f59e0b'],['#134e4a','#10b981'],['#831843','#fb7185'],['#1e293b','#94a3b8'],['#064e3b','#34d399'],['#3b0764','#c084fc'],['#0c4a6e','#38bdf8'],['#422006','#fbbf24']];

      const gallery = document.getElementById('gallery');
      const tl = document.getElementById('tl');
      const cluster = document.getElementById('cluster');
      const curEl = document.getElementById('cur');
      const totalEl = document.getElementById('total');
      const root = document.documentElement;
      let markers = [];
      let lastActive = -1;

      const smoothstep = (e0, e1, x) => { if (e0 === e1) return x < e0 ? 0 : 1; const t = Math.min(1, Math.max(0, (x - e0) / (e1 - e0))); return t * t * (3 - 2 * t); };
      const lerp = (a, b, t) => a + (b - a) * t;
      const widthFor = (d) => (d > K + J ? 0 : lerp(BASE_BAR, DOT_W, smoothstep(0, sharp, d)));
      const pad2 = (n) => String(n).padStart(2, '0');

      function buildCards() {
        gallery.innerHTML = '';
        for (let i = 0; i < N; i++) {
          const c = document.createElement('div');
          c.className = 'card';
          const [a, b] = palette[i % palette.length];
          c.style.background = `linear-gradient(155deg, ${a}, ${b})`;
          c.innerHTML = `<span class="idx">#${i + 1}</span><h3>${titles[i % titles.length]}</h3>`;
          gallery.appendChild(c);
        }
        totalEl.textContent = pad2(N);
      }
      function buildMarkers() {
        tl.innerHTML = '';
        markers = [];
        for (let i = 0; i < N; i++) {
          const m = document.createElement('button');
          m.className = 'marker';
          m.addEventListener('click', () => scrollToIndex(i));
          tl.appendChild(m);
          markers.push(m);
        }
      }
      function metrics() {
        const card = gallery.querySelector('.card');
        const cw = card ? card.getBoundingClientRect().width : 240;
        const pad = parseFloat(getComputedStyle(gallery).paddingLeft) || 0;
        return { cw, pad, stride: cw + 60 };
      }
      function progress() {
        const { cw, pad, stride } = metrics();
        const center = gallery.scrollLeft + gallery.clientWidth / 2;
        return Math.min(Math.max((center - (pad + cw / 2)) / stride, 0), N - 1);
      }
      function scrollToIndex(i) {
        const { cw, pad, stride } = metrics();
        gallery.scrollTo({ left: pad + i * stride + cw / 2 - gallery.clientWidth / 2, behavior: 'smooth' });
      }
      function isVisible(i) {
        const { cw, pad, stride } = metrics();
        const c = pad + i * stride + cw / 2;
        return c >= gallery.scrollLeft && c <= gallery.scrollLeft + gallery.clientWidth;
      }

      function render() {
        const active = Math.round(progress());
        const R = K + J;
        const widths = [];
        for (let i = 0; i < N; i++) widths.push(Math.abs(i - active) <= R ? widthFor(Math.abs(i - active)) : 0);
        for (let i = 0; i < N; i++) {
          const d = Math.abs(i - active);
          const inWin = d <= R;
          const m = markers[i];
          m.style.width = widths[i].toFixed(2) + 'px';
          m.style.marginInline = inWin ? GAP / 2 + 'px' : '0px';
          let op = 0;
          if (inWin) {
            const base = isVisible(i) ? 1 : 0.5;
            op = base * (d <= K ? 1 : 1 - smoothstep(K, R, d));
          }
          m.style.opacity = op.toFixed(3);
          m.classList.toggle('active', i === active);
          m.tabIndex = inWin ? 0 : -1;
          m.style.pointerEvents = inWin ? 'auto' : 'none';
        }
        // 居中偏移
        const slot = (i) => widths[i] + (Math.abs(i - active) <= R ? GAP : 0);
        let total = 0; for (let i = 0; i < N; i++) total += slot(i);
        let off = 0; for (let i = 0; i < active; i++) off += slot(i);
        off += (Math.abs(active - active) <= R ? GAP / 2 : 0) + (widths[active] || 0) / 2;
        tl.style.transform = `translateX(${(total / 2 - off).toFixed(2)}px)`;
        // 进度数字
        curEl.textContent = pad2(active + 1);
        // 切换 pop
        if (active !== lastActive) {
          if (popOn) { cluster.classList.remove('pop'); void tl.offsetWidth; cluster.classList.add('pop'); }
          lastActive = active;
        }
      }

      let raf = null;
      const schedule = () => { if (raf == null) raf = requestAnimationFrame(() => ((raf = null), render())); };
      gallery.addEventListener('scroll', schedule, { passive: true });
      gallery.addEventListener('wheel', (e) => { if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) { gallery.scrollLeft += e.deltaY; e.preventDefault(); } }, { passive: false });
      window.addEventListener('resize', schedule);

      const bind = (id, vid, fn) => { const el = document.getElementById(id), v = document.getElementById(vid); el.addEventListener('input', () => { v.textContent = el.value; fn(parseFloat(el.value)); schedule(); }); };
      bind('trans', 'vTrans', (x) => { root.style.setProperty('--trans', x + 'ms'); root.style.setProperty('--offset-trans', x + 40 + 'ms'); });
      bind('flow', 'vFlow', (x) => root.style.setProperty('--flow-dur', x + 's'));
      bind('breathe', 'vBreathe', (x) => root.style.setProperty('--breathe-dur', x + 's'));
      bind('kbars', 'vK', (x) => (K = Math.round(x)));
      bind('jdots', 'vJ', (x) => (J = Math.round(x)));
      bind('sharp', 'vSharp', (x) => (sharp = x));
      bind('numScale', 'vNum', (x) => root.style.setProperty('--num-scale', x));
      document.getElementById('cNum').addEventListener('change', (e) => cluster.classList.toggle('no-num', !e.target.checked));
      document.getElementById('cFlow').addEventListener('change', (e) => { cluster.classList.toggle('fx-flow', e.target.checked); cluster.classList.toggle('no-flow', !e.target.checked); });
      document.getElementById('cBreathe').addEventListener('change', (e) => cluster.classList.toggle('fx-breathe', e.target.checked));
      document.getElementById('cPop').addEventListener('change', (e) => (popOn = e.target.checked));
      document.getElementById('cSnap').addEventListener('change', (e) => gallery.classList.toggle('no-snap', !e.target.checked));
      document.getElementById('cReduce').addEventListener('change', (e) => {
        cluster.classList.toggle('fx-flow', !e.target.checked && document.getElementById('cFlow').checked);
        if (e.target.checked) { cluster.classList.remove('fx-flow', 'fx-breathe'); popOn = false; }
        else { cluster.classList.add('fx-flow', 'fx-breathe'); popOn = document.getElementById('cPop').checked; }
      });

      buildCards();
      buildMarkers();
      requestAnimationFrame(() => scrollToIndex(0));
      setTimeout(schedule, 50);
    </script>
  </body>
</html>
